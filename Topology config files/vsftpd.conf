#/etc/vsftpd/vsftpd.conf
# Basic settings
listen=YES
anonymous_enable=NO
local_enable=YES
write_enable=YES
local_umask=022

# Passive mode ports
pasv_min_port=30000
pasv_max_port=31000
pasv_address=10.1.64.4

# Security
chroot_local_user=YES
allow_writeable_chroot=YES

# Logging
xferlog_enable=YES
xferlog_file=/var/log/vsftpd.log